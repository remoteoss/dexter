stages:
  - test

variables:
  CGO_ENABLED: "1"
  GOLANGCI_LINT_VERSION: v2.9.0

test:
  stage: test
  image: golang:1.26
  cache:
    key:
      files:
        - go.sum
    paths:
      - /go/pkg/mod/
  script:
    - go test ./...
  tags:
    - size-m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

test:integration:
  stage: test
  image: elixir:1.19
  variables:
    MIX_HOME: "$CI_PROJECT_DIR/.mix"
    HEX_HOME: "$CI_PROJECT_DIR/.hex"
  cache:
    - key:
        files:
          - go.sum
      paths:
        - /go/pkg/mod/
        - .go/
    - key:
        files:
          - internal/lsp/testdata/monorepo/apps/app_with_styler/mix.lock
          - internal/lsp/testdata/monorepo/apps/app_with_ecto_migration/mix.lock
      paths:
        - .mix/
        - .hex/
        - internal/lsp/testdata/monorepo/apps/app_with_styler/deps/
        - internal/lsp/testdata/monorepo/apps/app_with_styler/_build/
        - internal/lsp/testdata/monorepo/apps/app_with_ecto_migration/deps/
        - internal/lsp/testdata/monorepo/apps/app_with_ecto_migration/_build/
  before_script:
    - |
      if [ ! -f .go/bin/go ]; then
        mkdir -p .go
        curl -fsSL https://go.dev/dl/go1.26.1.linux-amd64.tar.gz | tar -C .go --strip-components=1 -xz
      fi
    - export PATH=$CI_PROJECT_DIR/.go/bin:$PATH
    - mix local.hex --force && mix local.rebar --force
    - cd internal/lsp/testdata/monorepo/apps/app_with_styler && mix deps.get && mix deps.compile && cd -
    - cd internal/lsp/testdata/monorepo/apps/app_with_ecto_migration && mix deps.get && mix deps.compile && cd -
    - cd internal/lsp/testdata/monorepo/apps/app_basic && mix deps.get && cd -
  script:
    - export PATH=$CI_PROJECT_DIR/.go/bin:$PATH
    - go test ./internal/lsp/ -run 'TestFormatterServer_(WithStyler|BasicProject|BadIndentation|CacheInvalidation|DifferentProjects|MigrationDSL)' -v -timeout 120s
  tags:
    - size-m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

lint:
  stage: test
  image: golangci/golangci-lint:$GOLANGCI_LINT_VERSION
  cache:
    key:
      files:
        - go.sum
    paths:
      - /go/pkg/mod/
  script:
    - golangci-lint run ./...
    - go mod tidy && git diff --exit-code go.mod go.sum
  tags:
    - size-m
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

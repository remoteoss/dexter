name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.2)"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            platform: Linux_x86_64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            platform: Linux_arm64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            platform: Darwin_arm64
    runs-on: ${{ matrix.runner }}
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -buildvcs=false -o dexter ./cmd/
      - name: Package
        run: |
          name="dexter_${{ matrix.platform }}"
          mkdir "$name"
          cp dexter "$name/"
          tar czf "${name}.tar.gz" "$name"
      - uses: actions/upload-artifact@v4
        with:
          name: dexter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.tar.gz"
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dexter-*
          merge-multiple: true
      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > checksums.txt
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "${{ env.RELEASE_TAG }}" \
            --generate-notes \
            artifacts/*.tar.gz \
            artifacts/checksums.txt

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dexter-*
          merge-multiple: true

      - name: Compute SHA256s
        id: shas
        run: |
          echo "darwin_arm64=$(sha256sum artifacts/dexter_Darwin_arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum artifacts/dexter_Linux_x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum artifacts/dexter_Linux_arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          git clone https://x-access-token:${TAP_TOKEN}@github.com/remoteoss/homebrew-tap.git tap
          cd tap

          sed -i \
            -e "s/version \".*\"/version \"${VERSION}\"/" \
            -e "s|/download/v[0-9][^/]*/|/download/v${VERSION}/|g" \
            Formula/dexter.rb

          awk -v d="${{ steps.shas.outputs.darwin_arm64 }}" \
              -v lx="${{ steps.shas.outputs.linux_x86_64 }}" \
              -v la="${{ steps.shas.outputs.linux_arm64 }}" \
            'BEGIN{n=0} /sha256/{n++; if(n==1) sub(/sha256 ".*"/, "sha256 \""d"\"");
             if(n==2) sub(/sha256 ".*"/, "sha256 \""lx"\"");
             if(n==3) sub(/sha256 ".*"/, "sha256 \""la"\"")} {print}' \
            Formula/dexter.rb > Formula/dexter.rb.tmp
          mv Formula/dexter.rb.tmp Formula/dexter.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dexter.rb
          git diff --cached --quiet && echo "No changes to formula" && exit 0
          git commit -m "Update dexter to ${VERSION}"
          git push
